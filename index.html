<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Lumière · 娛樂手札</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:#2A2520;min-height:100vh;}
body{background:#2A2520;color:#2A2520;font-family:'Noto Sans TC','PingFang TC',sans-serif;font-size:15px;font-weight:400;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;}
#root{width:100%;max-width:480px;min-height:100vh;padding-bottom:80px;position:relative;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#C8C0B4;border-radius:2px;}
input,textarea,select{
  background:#FBF9F6;border:1.5px solid #C0B8B0;color:#2A2520;
  font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:400;
  border-radius:12px;padding:10px 14px;width:100%;max-width:100%;outline:none;
  transition:border-color .18s;-webkit-appearance:none;
}
input:focus,textarea:focus,select:focus{border-color:#B09080;}
input::placeholder,textarea::placeholder{color:#A09088;}
select option{background:#FBF9F6;}
button{cursor:pointer;font-family:inherit;font-weight:400;border:none;outline:none;background:none;}
.tap{transition:opacity .1s,transform .1s;}
.tap:active{opacity:.55;transform:scale(.96);}
.num{font-family:'Space Grotesk','Noto Sans TC',sans-serif;}
input[type="date"]{min-width:0;width:100%;}
.page{width:100%;padding:20px 18px 8px;}
.page-inner{width:100%;padding:10px 18px 0;}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useRef}=React;

/* ── TOKENS ────────────────────────────────────────── */
const T={
  bg:       "#F0EDE6",
  surface:  "#FAFAF7",
  white:    "#FFFFFF",
  ink:      "#2A2520",
  ink2:     "#4A4540",
  ink3:     "#706860",
  ink4:     "#9A9088",
  line:     "#C8C0B8",
  lineSoft: "#E0DAD2",
  bg2:      "#EDE8DF",

  rose:     "#C09090",   roseBg:"#F5EDEB",
  sage:     "#6EA890",   sageBg:"#E4F2EC",
  slate:    "#6E88B0",   slateBg:"#E4EBF5",
  sand:     "#B8986A",   sandBg:"#F2EAE0",
  mauve:    "#9878B8",   mauveBg:"#EDE6F5",
  olive:    "#88A070",   oliveBg:"#E8EEE0",
  coral:    "#C8806A",   coralBg:"#F5EAE6",
  teal:     "#5E9898",   tealBg:"#E2F0F0",

  catM:{line:"#6E88B0",bg:"#E8EFF8",text:"#3A5A88"},
  catD:{line:"#6EA890",bg:"#E2F0EA",text:"#2E7858"},
  catE:{line:"#C09090",bg:"#F5EDEB",text:"#906060"},
  catC:{line:"#9878B8",bg:"#EDE6F5",text:"#684898"},
};
const FACE_C=["","#C07068","#B09050","#5A9870","#4878B0","#8860B8"];
const DSubs=["韓劇","美劇","日劇","台劇","實境秀","動漫","紀錄片"];
const DTC={
  韓劇:{l:"#9878B8",t:"#684898"},美劇:{l:"#6E88B0",t:"#3A5A88"},
  日劇:{l:"#C09090",t:"#906060"},台劇:{l:"#88C0A0",t:"#2E7858"},
  實境秀:{l:"#B8986A",t:"#785828"},動漫:{l:"#88A070",t:"#486030"},
  紀錄片:{l:"#5E9898",t:"#2E6868"},
};
const catSt=c=>({電影:T.catM,戲劇:T.catD,展覽:T.catE,演唱會:T.catC}[c]||T.catM);

/* ── DATA ──────────────────────────────────────────── */
const NOW=new Date(),TY=NOW.getFullYear(),TM=NOW.getMonth()+1;
const ymd=(y,m,d)=>`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const pm=n=>{const d=new Date(TY,TM-1-n,1);return{y:d.getFullYear(),m:d.getMonth()+1};};
const EMPTY_DATA={title:"我的娛樂手札",movies:[],dramas:[],exhibitions:[],concerts:[]};
function loadData(){
  try{const s=localStorage.getItem("lumiere_data");return s?JSON.parse(s):EMPTY_DATA;}
  catch{return EMPTY_DATA;}
}
function saveData(d){
  try{localStorage.setItem("lumiere_data",JSON.stringify(d));}catch{}
}
function loadSettings(){
  try{const s=localStorage.getItem("lumiere_settings");return s?JSON.parse(s):{name:"",dark:false};}
  catch{return{name:"",dark:false};}
}
function saveSettings(s){
  try{localStorage.setItem("lumiere_settings",JSON.stringify(s));}catch{}
}

/* ── UTILS ─────────────────────────────────────────── */
const fD=s=>{if(!s)return"";const[y,m,d]=s.split("-");return`${y} · ${+m}月${+d}日`;};
const fDS=s=>{if(!s)return"";const[,m,d]=s.split("-");return`${+m}月${+d}日`;};
const fML=(y,m)=>`${y}年 ${m}月`;
const sM=(s,y,m)=>s?.startsWith(`${y}-${String(m).padStart(2,"0")}`);
const nid=()=>Date.now()+Math.random();
const ftm=(items,tf)=>{
  if(tf==="總覽")return items;
  if(tf==="本月")return items.filter(i=>sM(i.date,TY,TM));
  if(typeof tf==="object")return items.filter(i=>sM(i.date,tf.y,tf.m));
  return items;
};
const aF=d=>[
  ...d.movies.map(i=>({...i,_cat:"電影"})),
  ...d.dramas.map(i=>({...i,_cat:"戲劇"})),
  ...d.exhibitions.map(i=>({...i,_cat:"展覽"})),
  ...d.concerts.map(i=>({...i,_cat:"演唱會"})),
];

/* ── SVG ICONS ─────────────────────────────────────── */
const Sv=({s=22,vb="0 0 24 24",sw=1.6,col,ch})=>(
  <svg width={s} height={s} viewBox={vb} fill="none" stroke={col||"currentColor"} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{ch}</svg>
);
const IH=({s=22})=><Sv s={s} ch={<path d="M3 12L12 3l9 9v8a1 1 0 01-1 1h-5v-5h-4v5H4a1 1 0 01-1-1v-8z"/>}/>;
const IFm=({s=22})=><Sv s={s} ch={<><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20M7 6V3M12 6V3M17 6V3"/></>}/>;
const IDr=({s=22})=><Sv s={s} ch={<><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 20h8M12 17v3"/><path d="M10 10l5 2.5-5 2.5V10z" fill="currentColor" stroke="none"/></>}/>;
const IGl=({s=22})=><Sv s={s} ch={<><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><polyline points="21 15 16 10 5 21"/></>}/>;
const IMu=({s=22})=><Sv s={s} ch={<><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></>}/>;
const ISr=({s=22})=><Sv s={s} ch={<><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>}/>;
const ISt=({s=22})=><Sv s={s} ch={<><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></>}/>;
const IPlus=({s=18})=><Sv s={s} sw={2.5} ch={<><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></>}/>;
const IXc=({s=18})=><Sv s={s} sw={2.2} ch={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}/>;
const IEd=({s=15})=><Sv s={s} ch={<><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></>}/>;
const ITr=({s=15})=><Sv s={s} ch={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>}/>;
const ICL=({s=16})=><Sv s={s} sw={2} ch={<polyline points="15 18 9 12 15 6"/>}/>;
const ICR=({s=16})=><Sv s={s} sw={2} ch={<polyline points="9 18 15 12 9 6"/>}/>;
const ICD=({s=13})=><Sv s={s} sw={2} ch={<polyline points="6 9 12 15 18 9"/>}/>;
const IPn=({s=14})=><Sv s={s} ch={<><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></>}/>;
const IDl=({s=16})=><Sv s={s} ch={<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}/>;
const IUl=({s=16})=><Sv s={s} ch={<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>}/>;

/* ── FACE EXPRESSIONS: angry/blank/slight/big/open ─ */
// Each face drawn in 24×24 viewBox
const FACES=[null,
  // 1 angry
  <g key="a"><circle cx="9" cy="10" r="1.3" fill="currentColor"/><circle cx="15" cy="10" r="1.3" fill="currentColor"/><path d="M8.5 15.5c1-1.2 6-1.2 7 0" stroke="currentColor" strokeWidth={1.4} fill="none" strokeLinecap="round"/><path d="M7 7.5l3 1.5" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round"/><path d="M17 7.5l-3 1.5" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round"/></g>,
  // 2 blank
  <g key="b"><circle cx="9" cy="10" r="1.3" fill="currentColor"/><circle cx="15" cy="10" r="1.3" fill="currentColor"/><line x1="8.5" y1="15" x2="15.5" y2="15" stroke="currentColor" strokeWidth={1.4} strokeLinecap="round"/></g>,
  // 3 slight smile
  <g key="c"><circle cx="9" cy="10" r="1.3" fill="currentColor"/><circle cx="15" cy="10" r="1.3" fill="currentColor"/><path d="M9 14.5c1.2.9 5 .9 6 0" stroke="currentColor" strokeWidth={1.4} fill="none" strokeLinecap="round"/></g>,
  // 4 big smile
  <g key="d"><circle cx="9" cy="10" r="1.3" fill="currentColor"/><circle cx="15" cy="10" r="1.3" fill="currentColor"/><path d="M8 13.5c1.2 2.8 7 2.8 8 0" stroke="currentColor" strokeWidth={1.4} fill="none" strokeLinecap="round"/></g>,
  // 5 open mouth laugh
  <g key="e"><circle cx="9" cy="10" r="1.3" fill="currentColor"/><circle cx="15" cy="10" r="1.3" fill="currentColor"/><path d="M8 13c1.5 3.5 8.5 3.5 8 0" stroke="currentColor" strokeWidth={1.4} fill="none" strokeLinecap="round"/><ellipse cx="12" cy="16" rx="2.5" ry="1.5" fill="currentColor" opacity=".25"/></g>,
];
const MLABELS=["","難看","普通","還行","不錯","讚讚"];

function FaceCircle({n,size=30,active=false}){
  const col=active?FACE_C[n]:"#C0B8B0";
  const bg=active?FACE_C[n]+"18":"transparent";
  return(
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{display:"block"}}>
      <circle cx="12" cy="12" r="10.5" stroke={col} strokeWidth={active?1.8:1.4} fill={bg}/>
      {active&&FACES[n]&&<g stroke={col} fill={col} transform="translate(0,1)">{FACES[n]}</g>}
    </svg>
  );
}

function MoodPicker({value=0,onChange}){
  return(
    <div style={{display:"flex",gap:6,alignItems:"center"}}>
      {[1,2,3,4,5].map(n=>{
        const isSelected=n===value;
        return(
          <button key={n} className="tap" type="button" onClick={e=>{e.preventDefault();e.stopPropagation();onChange&&onChange(value===n?0:n);}}
            style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",padding:0,
              transform:isSelected?"scale(1.1)":"scale(1)",transition:"transform .15s"}}>
            <FaceCircle n={n} size={30} active={isSelected}/>
            <span style={{fontSize:9,color:isSelected?FACE_C[n]:"#C0B8B0",fontWeight:isSelected?500:300,letterSpacing:".2px"}}>{isSelected?MLABELS[n]:""}</span>
          </button>
        );
      })}
    </div>
  );
}

// Display: show all 5 circles, only the rated one is filled with face
function MoodIcon({value,size=22}){
  if(!value||value<1)return null;
  return(
    <div style={{display:"flex",gap:3,alignItems:"center"}}>
      {[1,2,3,4,5].map(n=>{
        const isRated=n===value;
        const col=isRated?FACE_C[value]:"#D0C8C0";
        return(
          <svg key={n} width={size} height={size} viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10.5" stroke={col} strokeWidth={isRated?1.8:1.2} fill={isRated?col+"18":"none"}/>
            {isRated&&FACES[value]&&<g stroke={col} fill={col} transform="translate(0,1)">{FACES[value]}</g>}
          </svg>
        );
      })}
    </div>
  );
}


/* ── CUSTOM DATE PICKER (3 selects, no jumping) ─────── */
function DatePicker({value,onChange,th=T}){
  const isDark=th.bg==="#141210";
  const NOW_Y=new Date().getFullYear();

  // parse existing value
  const parts=(value||"").split("-");
  const selY=parts[0]?parseInt(parts[0]):null;
  const selM=parts[1]?parseInt(parts[1]):null;
  const selD=parts[2]?parseInt(parts[2]):null;

  // viewing state — defaults to selected or current month
  const[viewY,setViewY]=useState(selY||NOW_Y);
  const[viewM,setViewM]=useState(selM||new Date().getMonth()+1);

  const daysInMonth=new Date(viewY,viewM,0).getDate();
  const firstDay=new Date(viewY,viewM-1,1).getDay();
  const isSelected=(d)=>selY===viewY&&selM===viewM&&selD===d;
  const isToday=(d)=>{const n=new Date();return n.getFullYear()===viewY&&n.getMonth()+1===viewM&&n.getDate()===d;};

  const prevMonth=()=>{if(viewM===1){setViewM(12);setViewY(y=>y-1);}else setViewM(m=>m-1);};
  const nextMonth=()=>{if(viewM===12){setViewM(1);setViewY(y=>y+1);}else setViewM(m=>m+1);};

  const pick=(d)=>{
    const yy=String(viewY);
    const mm=String(viewM).padStart(2,"0");
    const dd=String(d).padStart(2,"0");
    onChange(`${yy}-${mm}-${dd}`);
  };

  const bg=isDark?"#2A201C":"#FBF9F6";
  const border=isDark?"#4A3830":T.line;
  const inkC=isDark?"#EDE8E2":T.ink;
  const inkS=isDark?"#A09088":T.ink3;
  const inkF=isDark?"#6A5850":T.ink4;

  return(
    <div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:14,overflow:"hidden"}}>
      {/* Month navigation */}
      <div className="cal-nav" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:`1px solid ${border}`}}>
        <button className="tap" type="button" onClick={e=>{e.preventDefault();prevMonth();}} style={{width:28,height:28,borderRadius:"50%",border:`1.5px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"center",color:inkS,background:"none"}}>
          <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div style={{display:"flex",flexDirection:"row",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
          {/* Year quick-select */}
          <select value={viewY} onChange={e=>setViewY(parseInt(e.target.value))}
            onClick={e=>e.stopPropagation()}
            style={{background:"none",border:"none",fontSize:13,fontWeight:500,color:inkC,cursor:"pointer",outline:"none",appearance:"none",WebkitAppearance:"none",MozAppearance:"none",width:"auto",minWidth:60,flexShrink:0}}>
            {Array.from({length:10},(_,i)=>NOW_Y-i).map(y=><option key={y} value={y}>{y}年</option>)}
          </select>
          <span style={{fontSize:13,fontWeight:500,color:inkC,flexShrink:0}}>{viewM}月</span>
        </div>
        <button className="tap" type="button" onClick={e=>{e.preventDefault();nextMonth();}} style={{width:28,height:28,borderRadius:"50%",border:`1.5px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"center",color:inkS,background:"none"}}>
          <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      {/* Weekday headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"8px 8px 4px"}}>
        {["日","一","二","三","四","五","六"].map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:10,color:inkF,fontWeight:500,paddingBottom:4}}>{d}</div>
        ))}
      </div>

      {/* Day grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,padding:"0 8px 10px"}}>
        {Array(firstDay).fill(null).map((_,i)=><div key={`e${i}`}/>)}
        {Array.from({length:daysInMonth},(_,i)=>i+1).map(d=>{
          const sel=isSelected(d);
          const tod=isToday(d);
          return(
            <button key={d} className="tap" type="button" onClick={e=>{e.preventDefault();e.stopPropagation();pick(d);}} style={{
              height:34,borderRadius:34,border:"none",
              background:sel?T.rose:tod?"transparent":"transparent",
              color:sel?"#fff":tod?T.rose:inkC,
              fontSize:12,fontWeight:sel||tod?600:300,
              outline:tod&&!sel?`1.5px solid ${T.rose}`:"none",
              cursor:"pointer",
              transition:"background .12s",
            }}>{d}</button>
          );
        })}
      </div>

      {/* Selected value display */}
      {value&&(
        <div style={{padding:"8px 14px 10px",borderTop:`1px solid ${border}`,fontSize:11,color:T.rose,fontWeight:500,textAlign:"center"}}>
          已選：{selY}年{selM}月{selD}日
        </div>
      )}
    </div>
  );
}

/* ── DATE DISPLAY ──────────────────────────────────── */
const DTag=({date,th=T})=>(
  <span className="num" style={{fontSize:12,fontWeight:500,color:th.ink2,letterSpacing:".5px",display:"inline-flex",alignItems:"center",gap:5}}>
    <svg width={11} height={11} viewBox="0 0 24 24" fill="none" stroke={th.ink3} strokeWidth={2} strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    {fD(date)}
  </span>
);

/* ── SMALL TAG ─────────────────────────────────────── */
const Tg=({label,col})=>(
  <span style={{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:400,color:col||"#706860",border:`1.5px solid ${col||"#C8C0B8"}`,letterSpacing:".2px"}}>{label}</span>
);

/* ── TIME FILTER ───────────────────────────────────── */
function TFilt({value,onChange,th=T}){
  const[open,setOpen]=useState(false);
  const months=Array.from({length:12},(_,i)=>{const d=new Date(TY,TM-1-i,1);return{y:d.getFullYear(),m:d.getMonth()+1,label:`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}`};});
  const isMo=typeof value==="object";
  const chip=(v,lbl,act)=>(
    <button key={lbl} className="tap" onClick={()=>onChange(v)} style={{padding:"5px 13px",borderRadius:20,fontSize:11,fontWeight:500,background:act?T.rose:th.white,color:act?"#fff":th.ink3,border:`1.5px solid ${act?T.rose:th.line}`,transition:"all .15s"}}>{lbl}</button>
  );
  return(
    <div style={{display:"flex",gap:6,marginBottom:14,alignItems:"center",flexWrap:"wrap",position:"relative"}}>
      {chip("總覽","總覽",value==="總覽")}
      {chip("本月","本月",value==="本月")}
      <button className="tap" onClick={()=>setOpen(p=>!p)} style={{display:"flex",alignItems:"center",gap:3,padding:"5px 13px",borderRadius:20,fontSize:11,fontWeight:500,background:isMo?T.rose:th.white,color:isMo?"#fff":th.ink3,border:`1.5px solid ${isMo?T.rose:th.line}`}}>
        {isMo?value.label:"月份"}<ICD/>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"115%",left:0,zIndex:300,background:th.white,border:`1.5px solid ${th.line}`,borderRadius:14,padding:10,boxShadow:"0 8px 28px rgba(40,30,20,.12)",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,width:200,maxWidth:"calc(100vw - 32px)"}}>
          {months.map(mo=>(
            <button key={mo.label} className="tap" onClick={()=>{onChange(mo);setOpen(false);}} style={{padding:"6px 4px",borderRadius:8,fontSize:11,background:(isMo&&value.label===mo.label)?T.rose:"transparent",color:(isMo&&value.label===mo.label)?"#fff":th.ink3}}>{mo.label}</button>
          ))}

function Stats({data,th=T}){
  const[slide,setSlide]=useState(0);

  const ya=aF(data).filter(i=>i.date?.startsWith(String(TY)));

  const dC=data.dramas.filter(i=>i.date?.startsWith(String(TY))).length;
  const eC=data.exhibitions.filter(i=>i.date?.startsWith(String(TY))).length;
  const cC=data.concerts.filter(i=>i.date?.startsWith(String(TY))).length;
  const total=mC+dC+eC+cC;

  const dc={};data.dramas.filter(i=>i.date?.startsWith(String(TY))).forEach(i=>{dc[i.subtype]=(dc[i.subtype]||0)+1;});
  const de=Object.entries(dc).sort((a,b)=>b[1]-a[1]);
  const mc=Array.from({length:12},(_,mi)=>aF(data).filter(i=>sM(i.date,TY,mi+1)).length);

      {nameEdit&&(
        <div style={{background:th.white,borderRadius:14,border:`1.5px solid ${T.rose}`,padding:"16px",marginBottom:10}}>
          <div style={{fontSize:11,color:th.ink4,letterSpacing:"1px",marginBottom:8,textTransform:"uppercase"}}>手札名稱</div>
          <input autoFocus value={nameVal} onChange={e=>setNV(e.target.value)}
            placeholder="輸入你的名字或手札名稱"
            onKeyDown={e=>{if(e.key==="Enter"){setSettings(s=>({...s,name:nameVal}));setNE(false);}}}
            style={{marginBottom:12,background:th.bg,border:`1.5px solid ${th.line}`,color:th.ink}}
          />
          <div style={{display:"flex",gap:8}}>
            <button className="tap" onClick={()=>setNE(false)}
              style={{flex:1,padding:"10px",borderRadius:10,border:`1.5px solid ${th.line}`,fontSize:13,color:th.ink3,background:th.surface}}>取消</button>
            <button className="tap" onClick={()=>{setSettings(s=>({...s,name:nameVal}));setNE(false);}}
              style={{flex:2,padding:"10px",borderRadius:10,background:T.rose,fontSize:13,color:"#fff",fontWeight:500}}>儲存</button>
          </div>
        </div>
      )}

      {/* Display */}
      <div style={{fontSize:11,fontWeight:500,color:th.ink4,letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:8,marginTop:8}}>顯示設定</div>
      <Row>
        <Item label="深色模式" sub={settings.dark?"已開啟，省電護眼":"關閉"}
          right={<Toggle on={settings.dark} onToggle={()=>setSettings(s=>({...s,dark:!s.dark}))}/>}
        />
      </Row>

      {/* Data */}
      <div style={{fontSize:11,fontWeight:500,color:th.ink4,letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:8,marginTop:8}}>資料管理</div>
      <Row>
        <Item label="匯出備份" sub="將所有紀錄存成 JSON 檔案"
          right={<button className="tap" onClick={()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`lumiere-${new Date().toISOString().slice(0,10)}.json`;a.click();}}
            style={{padding:"5px 12px",borderRadius:20,fontSize:12,color:T.slate,border:`1.5px solid ${T.slate}`,fontWeight:400}}>匯出</button>}
        />
        <Item label="匯入備份" sub="從 JSON 檔案還原紀錄" last
          right={
            <label style={{padding:"5px 12px",borderRadius:20,fontSize:12,color:T.sage,border:`1.5px solid ${T.sage}`,fontWeight:400,cursor:"pointer"}}>
              匯入
              <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                const f=e.target.files?.[0];if(!f)return;
                const r=new FileReader();
                r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(imp.movies&&imp.dramas){setData(imp);alert("✓ 匯入成功！");}else alert("格式不符");}catch{alert("讀取失敗");}};
                r.readAsText(f);
              }}/>
            </label>
          }
        />
      </Row>

      {/* Stats summary */}
      <div style={{fontSize:11,fontWeight:500,color:th.ink4,letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:8,marginTop:8}}>紀錄總覽</div>
      <Row>
        {[["電影",data.movies.length,"部"],["戲劇",data.dramas.length,"部"],["展覽",data.exhibitions.length,"場"],["演唱會",data.concerts.length,"場"]].map(([label,n,unit],i,arr)=>(
          <Item key={label} label={label} last={i===arr.length-1}
            right={<span className="num" style={{fontSize:16,fontWeight:600,color:T.rose}}>{n}<span style={{fontSize:11,color:th.ink4,fontWeight:400,marginLeft:2}}>{unit}</span></span>}
          />
        ))}
      </Row>

      {/* App info */}
      <div style={{textAlign:"center",padding:"24px 0 8px",color:th.ink4,fontSize:11}}>
        <div style={{fontSize:16,marginBottom:4}}>✦</div>
        <div style={{fontWeight:500,color:th.ink3}}>Lumière</div>
        <div style={{marginTop:2}}>娛樂手札 · 所有資料僅存於本機</div>
      </div>
    </div>
  );
}

/* ── BOTTOM NAV ────────────────────────────────────── */
const NAVS=[
  {k:"home",lb:"首頁",I:IH},
  {k:"watchlist",lb:"片單",I:IFm},
  {k:"exhibition",lb:"展覽",I:IGl},
  {k:"concert",lb:"演唱會",I:IMu},
  {k:"stats",lb:"統計",I:ISt},
  {k:"settings",lb:"設定",I:ISettings},
];

function BNav({active,onNav,dark,th}){
  const navBg=dark?"rgba(22,19,16,.98)":"rgba(250,248,245,.98)";
  return(
    <nav style={{
      position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
      zIndex:100,width:"100%",maxWidth:480,
      background:navBg,backdropFilter:"blur(20px)",
      borderTop:`1px solid ${th.line}`,
      display:"flex",justifyContent:"space-around",alignItems:"center",
      padding:"10px 0 max(16px,env(safe-area-inset-bottom))",
    }}>
      {NAVS.map(({k,lb,I})=>{
        const on=active===k;
        return(
          <button key={k} className="tap" onClick={()=>onNav(k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:on?T.rose:th.ink4,padding:"4px 10px",minWidth:52,transition:"color .15s"}}>
            <div style={{width:40,height:32,borderRadius:14,background:on?T.roseBg:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}}><I s={20}/></div>
            <span style={{fontSize:10,fontWeight:on?500:400,letterSpacing:".2px"}}>{lb}</span>
          </button>
        );
      })}
    </nav>
  );
}

/* ── APP ───────────────────────────────────────────── */
function App(){
  const[page,setPage]=useState("home");
  const[data,setData]=useState(()=>loadData());
  const[settings,setSettings]=useState(()=>loadSettings());
  const th=getTheme(settings.dark);

  // persist data to localStorage whenever it changes
  useEffect(()=>{ saveData(data); },[data]);
  useEffect(()=>{ saveSettings(settings); },[settings]);

  // apply dark bg to body
  useEffect(()=>{
    document.body.style.background=th.bg;
    document.body.style.color=th.ink;
  },[th]);

  // Pass th to Stats & other pages via context-like prop threading
  return(
    <div style={{background:th.bg,minHeight:"100vh",width:"100%",paddingBottom:80,transition:"background .3s",overflowX:"hidden"}}>
      {page==="home"&&<Home data={data} setData={setData} onNav={setPage} settings={settings} th={th}/>}
      {page==="watchlist"&&<Watchlist data={data} setData={setData} th={th}/>}
      {page==="exhibition"&&<Exhibition data={data} setData={setData} th={th}/>}
      {page==="concert"&&<Concert data={data} setData={setData} th={th}/>}
      {page==="search"&&<Search data={data} th={th}/>}
      {page==="stats"&&<Stats data={data} th={th}/>}
      {page==="settings"&&<SettingsPage settings={settings} setSettings={setSettings} data={data} setData={setData} th={th}/>}
      <BNav active={page} onNav={setPage} dark={settings.dark} th={th}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
